name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -B '-Dmaven.test.skip=true' -f chat2db-server/pom.xml

      - name: Verify jar exists
        run: |
          if [ ! -f "chat2db-server/chat2db-server-web-start/target/chat2db-server-web-start.jar" ]; then
            echo "Error: chat2db-server-web-start.jar not found!"
            exit 1
          fi
          ls -lh chat2db-server/chat2db-server-web-start/target/chat2db-server-web-start.jar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          tags: chat2db/chat2db:${{ github.event.inputs.version }}
          build-args: |
            VERSION=${{ github.event.inputs.version }}
          load: true

      - name: Save Docker image
        run: |
          docker save chat2db/chat2db:${{ github.event.inputs.version }} | gzip > chat2db-${{ github.event.inputs.version }}-docker.tar.gz

      - name: Upload Docker image to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chat2db-docker-${{ github.event.inputs.version }}
          path: chat2db-${{ github.event.inputs.version }}-docker.tar.gz
          retention-days: 30
